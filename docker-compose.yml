services:
  db:
    image: postgres
    restart: always
    shm_size: 128mb

    environment:
      - POSTGRES_USER=shiki
      - POSTGRES_PASSWORD=Botan123
      - POSTGRES_DB=room_rental

    ports:
      - '5433:5432'

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_service
    restart: always

    ports:
      # For UI
      - '15672:15672'
      # For core
      - '5672:5672'

    environment:
      - RABBITMQ_DEFAULT_USER=shiki
      - RABBITMQ_DEFAULT_PASS=Botan123

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch_service
    restart: always

    ports:
      - '7700:7700'

    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_API_KEY}

    volumes:
      - meilisearch_data:/meili_data

volumes:
  rabbitmq_data:
  meilisearch_data: